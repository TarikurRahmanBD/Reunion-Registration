<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMHS Reunion 2026 Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-gray-900/60 backdrop-blur-md border border-gray-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                Sunshine Model High School
            </h1>
            <p class="text-gray-400 mt-2 text-sm md:text-base">🎉 Eid-ul-Adha Reunion 2026 Registration 🎉</p>
        </div>

        <form id="reunionForm" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">পূর্ণ নাম (Full Name)</label>
                    <input type="text" id="fullName" required class="w-full bg-gray-950/80 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-cyan-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">ইমেইল ঠিকানা (Email Address)</label>
                    <input type="email" id="userEmail" required class="w-full bg-gray-950/80 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-cyan-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">মোবাইল নম্বর (WhatsApp)</label>
                    <input type="tel" id="phone" required class="w-full bg-gray-950/80 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-cyan-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">বর্তমান ঠিকানা (Current Location)</label>
                    <input type="text" id="location" required class="w-full bg-gray-950/80 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-cyan-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">SSC ব্যাচ (SSC Batch)</label>
                    <select id="sscBatch" required class="w-full bg-gray-950/80 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-cyan-500 transition text-gray-300">
                        <option value="" disabled selected>ব্যাচ সিলেক্ট করুন</option>
                        <option value="2018">২০১৮</option>
                        <option value="2019">২০১৯</option>
                        <option value="2020">২০২০</option>
                        <option value="2021">২০২১</option>
                        <option value="2022">২০২২</option>
                        <option value="2023">২০২৩</option>
                        <option value="2024">২০২৪</option>
                        <option value="2025">২০২৫</option>
                        <option value="2026">২০২৬</option>
                        <option value="Other">২০১৮-এর পূর্বের / অন্যান্য</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">গেঞ্জির সাইজ (T-Shirt Size)</label>
                    <select id="tShirtSize" required class="w-full bg-gray-950/80 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-cyan-500 transition text-gray-300">
                        <option value="" disabled selected>সাইজ সিলেক্ট করুন</option>
                        <option value="S">S (Small)</option>
                        <option value="M">M (Medium)</option>
                        <option value="L">L (Large)</option>
                        <option value="XL">XL (Extra Large)</option>
                        <option value="XXL">XXL (Double Extra Large)</option>
                    </select>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:from-cyan-600 hover:to-blue-700 transition transform active:scale-98 cursor-pointer text-center">
                    রেজিস্ট্রেশন সম্পন্ন করুন
                </button>
            </div>
        </form>

    </div>

    <script src="app.js"></script>
</body>
</html>
